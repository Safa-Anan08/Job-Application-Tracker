<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F4F6F8] font-sans">

<div class="max-w-6xl mx-auto p-6">

 
  <h1 class="text-2xl font-bold text-[#1E3A5F] mb-6">
    Job Application Tracker
  </h1>


  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

    <div class="bg-white p-5 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Total</p>
      <h2 id="totalJobs" class="text-2xl font-bold text-[#1E3A5F]">0</h2>
    </div>

    <div class="bg-white p-5 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Interview</p>
      <h2 id="interviewCount" class="text-2xl font-bold text-green-600">0</h2>
    </div>

    <div class="bg-white p-5 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Rejected</p>
      <h2 id="rejectedCount" class="text-2xl font-bold text-red-500">0</h2>
    </div>

  </div>


  <div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-semibold text-[#1E3A5F]">Available Jobs</h2>
    <span id="tabCount" class="text-gray-500 text-sm">0 jobs</span>
  </div>


  <div class="flex gap-2 mb-6">
    <button onclick="switchTab('all')" id="tab-all"
      class="tab-btn px-4 py-2 rounded bg-blue-600 text-white text-sm">
      All
    </button>

    <button onclick="switchTab('interview')" id="tab-interview"
      class="tab-btn px-4 py-2 rounded bg-white text-gray-600 text-sm">
      Interview
    </button>

    <button onclick="switchTab('rejected')" id="tab-rejected"
      class="tab-btn px-4 py-2 rounded bg-white text-gray-600 text-sm">
      Rejected
    </button>
  </div>

 
  <div id="jobContainer" class="space-y-4"></div>


  <div id="emptyState" class="hidden text-center py-16">
    <h3 class="text-lg font-semibold text-gray-700">No Jobs Available</h3>
    <p class="text-gray-500 text-sm">There are no jobs in this category</p>
  </div>

</div>

<script src="script.js">
</script>
</body>
</html>
